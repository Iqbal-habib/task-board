<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Tasks</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        board: {
          bg: '#f1f5f9',
          card: '#ffffff',
          darkBg: '#0f172a',
          darkCard: '#1e293b',
        }
      }
    }
  }
}
</script>
<style>
  /* ── Base & Scrollbar ── */
  * { -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: contain; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
  .dark ::-webkit-scrollbar-thumb { background: #475569; }

  /* ── Kanban columns ── */
  #sections-container { scrollbar-width: none; -ms-overflow-style: none; }
  #sections-container::-webkit-scrollbar { display: none; }
  [id^="task-list-"] { scrollbar-width: thin; }
  [id^="task-list-"]::-webkit-scrollbar { width: 4px; }
  [id^="task-list-"]::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  .dark [id^="task-list-"]::-webkit-scrollbar-thumb { background: #334155; }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 600px; } }
  @keyframes slideUp { from { opacity: 1; max-height: 600px; } to { opacity: 0; max-height: 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes toastIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100%); opacity: 0; } }
  @keyframes completeSlide {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.95); background: #22c55e20; }
    100% { opacity: 0; transform: scale(0.9) translateX(20px); }
  }
  .animate-fade-in { animation: fadeIn 0.25s ease-out; }
  .animate-slide-down { animation: slideDown 0.3s ease-out; overflow: hidden; }
  .animate-complete { animation: completeSlide 0.4s ease-out forwards; }
  .animate-toast-in { animation: toastIn 0.3s ease-out; }
  .animate-toast-out { animation: toastOut 0.3s ease-out forwards; }
  .animate-spin { animation: spin 1s linear infinite; }
  .animate-pulse { animation: pulse 2s ease-in-out infinite; }

  /* ── SortableJS ghost ── */
  .sortable-ghost { opacity: 0.4; }
  .sortable-chosen { box-shadow: 0 8px 25px rgba(0,0,0,0.15); transform: scale(1.02); }
  .dark .sortable-chosen { box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
  .sortable-drag { opacity: 0.9; }

  /* ── Draggable cards ── */
  .task-card { cursor: grab; touch-action: none; }
  .task-card:active { cursor: grabbing; }
  .task-card button { cursor: pointer; }

  /* ── Goals scrollbar ── */
  .goals-scroll::-webkit-scrollbar { height: 0; }

  /* ── Context menu ── */
  .ctx-menu { box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .dark .ctx-menu { box-shadow: 0 4px 20px rgba(0,0,0,0.5); }

  /* ── Pull to refresh indicator ── */
  .pull-indicator { transition: transform 0.2s ease; }

  /* ── Modal backdrop ── */
  .modal-backdrop { backdrop-filter: blur(4px); }
</style>
</head>
<body class="bg-board-bg dark:bg-board-darkBg min-h-screen transition-colors duration-300">

<!-- ═══════════════════════════════════════════════════ -->
<!--  TOAST CONTAINER                                    -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="toast-container" class="fixed top-0 left-0 right-0 z-[100] flex flex-col items-center pointer-events-none"></div>

<!-- ═══════════════════════════════════════════════════ -->
<!--  OFFLINE BANNER                                     -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="offline-banner" class="hidden fixed top-0 left-0 right-0 z-50 bg-amber-500 text-white text-center text-sm py-1.5 font-medium">
  Offline — showing cached data
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!--  SETUP SCREEN                                       -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="setup-screen" class="hidden min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-8 animate-fade-in">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Task Board</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Connect to GitHub to sync your tasks</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Personal Access Token</label>
        <input id="setup-token" type="password" placeholder="ghp_xxxxxxxxxxxx"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">GitHub Username</label>
        <input id="setup-owner" type="text" placeholder="octocat"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Repository</label>
        <input id="setup-repo" type="text" placeholder="my-tasks"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">File Path</label>
        <input id="setup-path" type="text" value="tasks.json"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      </div>
      <div id="setup-error" class="hidden text-red-500 text-sm text-center"></div>
      <button id="setup-connect" onclick="handleSetup()"
        class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition-colors text-sm">
        Connect
      </button>
      <button onclick="skipSetup()"
        class="w-full py-2.5 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 font-medium text-sm transition-colors">
        Use offline only
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!--  MAIN BOARD                                         -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="board-screen" class="hidden">

  <!-- ── Top Bar ── -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700">
    <!-- Goals Bar -->
    <div id="goals-bar" class="hidden px-4 py-2 border-b border-slate-100 dark:border-slate-700/50">
      <div class="goals-scroll flex gap-2 overflow-x-auto pb-1" id="goals-container"></div>
    </div>
    <!-- Header Row -->
    <div class="flex items-center justify-between px-4 py-3">
      <h1 class="text-lg font-bold text-slate-900 dark:text-white">Tasks</h1>
      <div class="flex items-center gap-3">
        <!-- Sync indicator -->
        <div id="sync-indicator" class="flex items-center gap-1.5 cursor-pointer" onclick="manualSync()">
          <div id="sync-dot" class="w-2.5 h-2.5 rounded-full bg-green-500 transition-colors"></div>
          <span id="sync-label" class="text-xs text-slate-500 dark:text-slate-400 hidden sm:inline">Synced</span>
        </div>
        <!-- Refresh -->
        <button onclick="manualSync()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="Refresh">
          <svg class="w-4 h-4 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>
        <!-- Dark mode toggle -->
        <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="Toggle dark mode">
          <svg id="icon-sun" class="w-4 h-4 text-slate-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg id="icon-moon" class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <!-- Search toggle -->
        <button onclick="toggleSearch()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="Search">
          <svg class="w-4 h-4 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </button>
        <!-- Settings -->
        <button onclick="showSettings()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="Settings">
          <svg class="w-4 h-4 text-slate-500 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Debts Panel -->
    <div id="debts-panel" class="hidden border-t border-slate-100 dark:border-slate-700/50">
      <button onclick="toggleDebts()" class="w-full flex items-center justify-between px-4 py-2 text-sm">
        <span class="font-medium text-slate-700 dark:text-slate-300">Debts Summary</span>
        <svg id="debts-chevron" class="w-4 h-4 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="debts-content" class="hidden px-4 pb-3" ></div>
    </div>
  </header>

  <!-- ── Pull to Refresh Indicator ── -->
  <div id="pull-indicator" class="pull-indicator flex justify-center py-2 -mt-10 transition-all">
    <svg class="w-5 h-5 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
    </svg>
  </div>

  <!-- ── View Tabs ── -->
  <div id="view-tabs" class="px-3 sm:px-4 pt-2 pb-1">
    <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 rounded-xl p-1">
      <button onclick="setView('all')" data-view="all" class="view-tab flex-1 px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-colors">All</button>
      <button onclick="setView('personal')" data-view="personal" class="view-tab flex-1 px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-colors">Personal</button>
      <button onclick="setView('work')" data-view="work" class="view-tab flex-1 px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-colors">Work</button>
      <button onclick="setView('case')" data-view="case" class="view-tab flex-1 px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-colors">Case</button>
    </div>
  </div>

  <!-- ── Search Bar ── -->
  <div id="search-bar" class="hidden px-3 sm:px-4 pt-1 pb-1">
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search tasks..."
        oninput="handleSearch(this.value)"
        class="w-full pl-9 pr-8 py-2 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
      <button onclick="clearSearch()" class="absolute right-2.5 top-1/2 -translate-y-1/2 p-0.5 rounded hover:bg-slate-200 dark:hover:bg-slate-600">
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Suggestions Panel ── -->
  <div id="suggestions-panel" class="hidden px-3 sm:px-4 pt-1 pb-0.5">
    <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50 rounded-lg overflow-hidden">
      <button onclick="toggleSuggestions()" class="w-full flex items-center justify-between px-2.5 py-1">
        <div class="flex items-center gap-1.5">
          <svg class="w-3 h-3 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
          <span class="text-[11px] font-semibold text-amber-800 dark:text-amber-300">Suggestions</span>
          <span id="suggestion-count" class="text-[10px] font-medium px-1 py-px rounded-full bg-amber-200 dark:bg-amber-800 text-amber-700 dark:text-amber-300">0</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span onclick="event.stopPropagation(); dismissAllSuggestions()" class="text-[10px] text-amber-600 dark:text-amber-400 hover:underline">Dismiss all</span>
          <svg id="suggestions-chevron" class="w-3 h-3 text-amber-400 transition-transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </button>
      <div id="suggestions-list" class="px-1.5 pb-1 space-y-0.5 max-h-28 overflow-y-auto"></div>
      <div class="flex gap-1 px-1.5 pb-1.5 pt-0.5">
        <input id="suggest-input" type="text" placeholder="Ask Claude to suggest..."
          class="flex-1 px-2 py-0.5 text-[10px] rounded border border-amber-200 dark:border-amber-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-amber-400"
          onkeydown="if(event.key==='Enter')saveSuggestRequest()">
        <button onclick="saveSuggestRequest()" class="px-2 py-0.5 text-[10px] font-medium bg-amber-500 hover:bg-amber-600 text-white rounded transition-colors">Send</button>
      </div>
    </div>
  </div>

  <!-- ── Swim Lanes Container ── -->
  <main class="pb-24 pt-1 px-3 sm:px-4 overflow-y-auto" style="height: calc(100vh - 110px)">
    <div id="lanes-container" class="space-y-3"></div>
  </main>

  <!-- ── FAB ── -->
  <button id="fab" onclick="quickAdd('backlog', activeView !== 'all' ? activeView : 'personal')"
    class="fixed bottom-6 right-6 w-14 h-14 bg-blue-500 hover:bg-blue-600 active:scale-95 text-white rounded-full shadow-lg flex items-center justify-center transition-all z-30">
    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
    </svg>
  </button>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!--  TASK MODAL                                         -->
<!-- ═══════════════════════════════════════════════════ -->
<div id="task-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center modal-backdrop bg-black/40">
  <div class="w-full sm:max-w-lg bg-white dark:bg-slate-800 rounded-t-2xl sm:rounded-2xl shadow-2xl animate-fade-in max-h-[90vh] overflow-y-auto">
    <div class="p-5">
      <div class="flex items-center justify-between mb-5">
        <h2 id="modal-title" class="text-lg font-bold text-slate-900 dark:text-white">Add Task</h2>
        <button onclick="closeModal()" class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Title</label>
          <input id="modal-task-title" type="text" placeholder="What needs to be done?"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
            onkeydown="if(event.key==='Enter')saveTask()">
        </div>
        <div id="modal-section-row" class="hidden">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Section</label>
          <select id="modal-section"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <option value="backlog">Backlog</option>
            <option value="this-week">This Week</option>
            <option value="today">Today</option>
            <option value="things-to-buy">Things to Buy</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div id="modal-category-row" class="hidden">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Category</label>
          <select id="modal-category"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <option value="personal">Personal</option>
            <option value="work">Work</option>
            <option value="case">Case</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Note <span class="text-slate-400 font-normal">(optional)</span></label>
          <textarea id="modal-note" rows="2" placeholder="Add details..."
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"></textarea>
        </div>
        <div id="modal-tags-row" class="hidden">
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Tags <span class="text-slate-400 font-normal">(comma-separated)</span></label>
          <input id="modal-tags" type="text" placeholder="work, urgent, personal"

<script>
// ═══════════════════════════════════════════════════
//  STATE & CONFIG
// ═══════════════════════════════════════════════════
let state = null;        // the full tasks.json object
let fileSha = null;      // current SHA for GitHub optimistic concurrency
let ghConfig = null;     // { token, owner, repo, path }
let saveTimer = null;    // debounce timer
let offlineMutations = [];
let isOffline = false;
let sortableInstances = [];
let menuTaskId = null;
let menuSectionId = null;
let editingTaskId = null;
let doneCollapsed = true;
let debtsExpanded = false;
let expandedCardId = null;
let confirmPromiseResolve = null;
let activeView = localStorage.getItem('tb-active-view') || 'all';
let searchQuery = '';
let expandedSuggestions = new Set();

const TAG_COLORS = [
  'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
  'bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300',
  'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',
  'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300',

  'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/40 dark:text-cyan-300',
  'bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-300',
];

const SECTION_META = {
  'backlog':       { title: 'Backlog',       color: '#6b7280', bg: 'bg-gray-500',   ring: 'ring-gray-500/20' },
  'this-week':     { title: 'This Week',     color: '#8b5cf6', bg: 'bg-violet-500', ring: 'ring-violet-500/20' },
  'today':         { title: 'Today',         color: '#3b82f6', bg: 'bg-blue-500',   ring: 'ring-blue-500/20' },
  'things-to-buy': { title: 'Things to Buy', color: '#f59e0b', bg: 'bg-amber-500',  ring: 'ring-amber-500/20' },
  'done':          { title: 'Done',          color: '#22c55e', bg: 'bg-green-500',  ring: 'ring-green-500/20' },
};

const CATEGORY_META = {
  personal: { label: 'Personal', color: '#22c55e', border: 'border-l-green-500', pill: 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300' },
  work:     { label: 'Work',     color: '#3b82f6', border: 'border-l-blue-500',  pill: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300' },
  case:     { label: 'Case',     color: '#ef4444', border: 'border-l-red-500',   pill: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300' },
};

const DEFAULT_STATE = {
  version: 1,
  lastModifiedBy: 'web',
  lastModifiedAt: new Date().toISOString(),
  sections: [
    { id: 'backlog', title: 'Backlog', color: '#6b7280', tasks: [] },
    { id: 'this-week', title: 'This Week', color: '#8b5cf6', tasks: [] },
    { id: 'today', title: 'Today', color: '#3b82f6', tasks: [] },
    { id: 'things-to-buy', title: 'Things to Buy', color: '#f59e0b', tasks: [] },
    { id: 'done', title: 'Done', color: '#22c55e', tasks: [] },
  ],
  goals: [],
  debts: [],
  suggestions: [],
  suggestionRequest: '',
};

// ═══════════════════════════════════════════════════
//  DARK MODE
// ═══════════════════════════════════════════════════
function initDarkMode() {
  const saved = localStorage.getItem('tb-dark-mode');
  let dark;
  if (saved !== null) {
    dark = saved === 'true';
  } else {
    dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  applyDarkMode(dark);
}

function applyDarkMode(dark) {
  document.documentElement.classList.toggle('dark', dark);
  document.getElementById('icon-sun').classList.toggle('hidden', !dark);
  document.getElementById('icon-moon').classList.toggle('hidden', dark);
}

function toggleDarkMode() {
  const dark = !document.documentElement.classList.contains('dark');
  localStorage.setItem('tb-dark-mode', dark);
  applyDarkMode(dark);
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const colors = {
    info: 'bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800',
    success: 'bg-green-600 text-white',
    error: 'bg-red-600 text-white',
    warning: 'bg-amber-500 text-white',
  };
  const el = document.createElement('div');
  el.className = `mt-3 px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg pointer-events-auto animate-toast-in ${colors[type] || colors.info}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('animate-toast-out');
    el.addEventListener('animationend', () => el.remove());
  }, 2500);
}

// ═══════════════════════════════════════════════════
//  CONFIRM DIALOG
// ═══════════════════════════════════════════════════
function showConfirm(message) {
  return new Promise(resolve => {
    confirmPromiseResolve = resolve;
    document.getElementById('confirm-message').textContent = message;
    document.getElementById('confirm-dialog').classList.remove('hidden');
  });
}

function confirmResolve(result) {
  document.getElementById('confirm-dialog').classList.add('hidden');
  if (confirmPromiseResolve) {
    confirmPromiseResolve(result);
    confirmPromiseResolve = null;
  }
}

// ═══════════════════════════════════════════════════
//  SYNC INDICATOR
// ═══════════════════════════════════════════════════
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'w-2.5 h-2.5 rounded-full transition-colors';
  switch (status) {
    case 'synced':
      dot.classList.add('bg-green-500');
      label.textContent = 'Synced';
      break;
    case 'saving':
      dot.classList.add('bg-amber-400', 'animate-spin');
      label.textContent = 'Saving...';
      break;
    case 'error':
      dot.classList.add('bg-red-500', 'animate-pulse');
      label.textContent = 'Error';
      break;
    case 'offline':
      dot.classList.add('bg-amber-400');
      label.textContent = 'Offline';
      break;
  }
}

// ═══════════════════════════════════════════════════
//  GITHUB API
// ═══════════════════════════════════════════════════
function ghHeaders() {
  return {
    'Authorization': `Bearer ${ghConfig.token}`,
    'Accept': 'application/vnd.github.v3+json',
  };
}

function ghUrl() {
  return `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`;
}

async function ghFetch() {
  if (!ghConfig) return null;
  const resp = await fetch(ghUrl(), { headers: ghHeaders() });
  if (!resp.ok) throw new Error(`GitHub GET ${resp.status}`);
  const data = await resp.json();
  fileSha = data.sha;
  const content = atob(data.content.replace(/\n/g, ''));
  // Handle UTF-8 properly
  const bytes = new Uint8Array([...content].map(c => c.charCodeAt(0)));
  const decoded = new TextDecoder().decode(bytes);
  return JSON.parse(decoded);
}

async function ghPut(data) {
  if (!ghConfig) return;
  setSyncStatus('saving');
  const json = JSON.stringify(data, null, 2);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  try {
    const resp = await fetch(ghUrl(), {
      method: 'PUT',
      headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `Update tasks via web board`,
        content: encoded,
        sha: fileSha,
      }),
    });
    if (resp.status === 409) {
      // SHA mismatch — re-fetch
      showToast('Synced latest changes', 'info');
      await loadFromGitHub();
      return;
    }
    if (!resp.ok) throw new Error(`GitHub PUT ${resp.status}`);
    const result = await resp.json();
    fileSha = result.content.sha;
    setSyncStatus('synced');
  } catch (err) {
    console.error('ghPut error:', err);
    setSyncStatus('error');
    showToast('Failed to save — will retry', 'error');
    // queue for retry
    queueOfflineMutation();
  }
}

function queueOfflineMutation() {
  localStorage.setItem('tb-pending-save', 'true');
}

// ═══════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════
async function handleSetup() {
  const token = document.getElementById('setup-token').value.trim();
  const owner = document.getElementById('setup-owner').value.trim();
  const repo = document.getElementById('setup-repo').value.trim();
  const path = document.getElementById('setup-path').value.trim();
  const errEl = document.getElementById('setup-error');
  const btn = document.getElementById('setup-connect');

  if (!token || !owner || !repo || !path) {
    errEl.textContent = 'All fields are required';
    errEl.classList.remove('hidden');
    return;
  }

  btn.textContent = 'Connecting...';
  btn.disabled = true;
  errEl.classList.add('hidden');

  ghConfig = { token, owner, repo, path };

  try {
    const data = await ghFetch();
    localStorage.setItem('tb-gh-config', JSON.stringify(ghConfig));
    localStorage.setItem('tb-cache', JSON.stringify(data));
    state = data;
    showBoard();
    setSyncStatus('synced');
  } catch (err) {
    errEl.textContent = `Connection failed: ${err.message}`;
    errEl.classList.remove('hidden');
    ghConfig = null;
  } finally {
    btn.textContent = 'Connect';
    btn.disabled = false;
  }
}

function skipSetup() {
  const cached = localStorage.getItem('tb-cache');
  state = cached ? JSON.parse(cached) : JSON.parse(JSON.stringify(DEFAULT_STATE));
  showBoard();
  setSyncStatus('offline');
}

// ═══════════════════════════════════════════════════
//  LOAD & INIT
// ═══════════════════════════════════════════════════
async function loadFromGitHub() {
  try {
    const data = await ghFetch();
    state = data;
    localStorage.setItem('tb-cache', JSON.stringify(data));
    isOffline = false;
    document.getElementById('offline-banner').classList.add('hidden');
    setSyncStatus('synced');
    render();
  } catch (err) {
    console.error('Load error:', err);
    isOffline = true;
    document.getElementById('offline-banner').classList.remove('hidden');
    setSyncStatus('offline');
    const cached = localStorage.getItem('tb-cache');
    if (cached) {
      state = JSON.parse(cached);
      render();
    }
  }
}

async function manualSync() {
  if (!ghConfig) return;
  setSyncStatus('saving');
  await loadFromGitHub();
}

function showBoard() {
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('board-screen').classList.remove('hidden');
  render();
}

// ═══════════════════════════════════════════════════
//  SAVE (DEBOUNCED)
// ═══════════════════════════════════════════════════
function scheduleSave() {
  state.lastModifiedBy = 'web';
  state.lastModifiedAt = new Date().toISOString();

  // Rolling backups before overwriting
  const current = localStorage.getItem('tb-cache');
  if (current) {
    const backup1 = localStorage.getItem('tb-backup-1');
    if (backup1) localStorage.setItem('tb-backup-2', backup1);
    localStorage.setItem('tb-backup-1', current);
  }

  localStorage.setItem('tb-cache', JSON.stringify(state));

  if (!ghConfig) return;

  clearTimeout(saveTimer);
  setSyncStatus('saving');
  saveTimer = setTimeout(() => ghPut(state), 1000);
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function render() {
  if (!state) return;
  updateViewTabs();
  renderGoals();
  renderDebts();
  renderSuggestions();
  renderSections();
  initSortable();
}

// ── Goals ──
function renderGoals() {
  const goals = (state.goals || []).filter(g => g.active);
  const bar = document.getElementById('goals-bar');
  const container = document.getElementById('goals-container');

  if (!goals.length) {
    bar.classList.add('hidden');
    return;
  }

  bar.classList.remove('hidden');
  const goalColors = ['bg-blue-500', 'bg-violet-500', 'bg-amber-500', 'bg-rose-500', 'bg-emerald-500'];
  container.innerHTML = goals.map((g, i) => `
    <button onclick="showGoalPopover(event, '${g.id}')"
      class="flex-shrink-0 px-3 py-1 ${goalColors[i % goalColors.length]} text-white text-xs font-medium rounded-full whitespace-nowrap">
      ${escHtml(g.title)}
    </button>
  `).join('');
}

function showGoalPopover(event, goalId) {
  const goal = state.goals.find(g => g.id === goalId);
  if (!goal) return;

  const pop = document.getElementById('goal-popover');
  document.getElementById('goal-popover-title').textContent = goal.title;
  document.getElementById('goal-popover-details').textContent = goal.details || 'No details';
  pop.classList.remove('hidden');

  const rect = event.target.getBoundingClientRect();
  pop.style.top = (rect.bottom + 8) + 'px';
  pop.style.left = Math.min(rect.left, window.innerWidth - 260) + 'px';

  setTimeout(() => {
    document.addEventListener('click', closeGoalPopover, { once: true });
  }, 10);
}

function closeGoalPopover() {
  document.getElementById('goal-popover').classList.add('hidden');
}

// ── Debts ──
function renderDebts() {
  const debts = (state.debts || []).filter(d => !d.resolved);
  const panel = document.getElementById('debts-panel');

  if (!debts.length) {
    panel.classList.add('hidden');
    return;
  }

  panel.classList.remove('hidden');
  const content = document.getElementById('debts-content');
  const total = debts.reduce((s, d) => s + (d.amount || 0), 0);

  content.innerHTML = `
    <div class="space-y-2">
      ${debts.map(d => `
        <div class="flex items-center justify-between text-sm">
          <span class="text-slate-600 dark:text-slate-400">${escHtml(d.label)}</span>
          <span class="font-medium text-slate-900 dark:text-white">$${(d.amount || 0).toLocaleString()}</span>
        </div>
      `).join('')}
      <div class="flex items-center justify-between text-sm font-bold pt-2 border-t border-slate-200 dark:border-slate-600">
        <span class="text-slate-700 dark:text-slate-300">Total</span>
        <span class="text-slate-900 dark:text-white">$${total.toLocaleString()}</span>
      </div>
    </div>
  `;
}

function toggleDebts() {
  debtsExpanded = !debtsExpanded;
  document.getElementById('debts-content').classList.toggle('hidden', !debtsExpanded);
  document.getElementById('debts-chevron').style.transform = debtsExpanded ? 'rotate(180deg)' : '';
}

// ── Suggestions ──
let suggestionsExpanded = true;

function renderSuggestions() {
  const suggestions = (state.suggestions || []).filter(s => s.status === 'pending');
  const panel = document.getElementById('suggestions-panel');

  if (!suggestions.length) {
    panel.classList.add('hidden');
    return;
  }

  panel.classList.remove('hidden');
  document.getElementById('suggestion-count').textContent = suggestions.length;
  const list = document.getElementById('suggestions-list');
  list.classList.toggle('hidden', !suggestionsExpanded);
  document.getElementById('suggestions-chevron').style.transform = suggestionsExpanded ? 'rotate(180deg)' : '';

  const typeLabels = { rewrite: 'Rewrite', merge: 'Merge', move: 'Move', archive: 'Archive', delete: 'Delete' };
  const typeColors = {
    rewrite: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
    merge: 'bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300',
    move: 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/40 dark:text-cyan-300',
    archive: 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300',
    delete: 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300',
  };

  list.innerHTML = suggestions.map(sg => {
    const label = typeLabels[sg.type] || sg.type;
    const color = typeColors[sg.type] || typeColors.rewrite;
    const isExpanded = expandedSuggestions.has(sg.id);
    const chevron = isExpanded ? '&#9660;' : '&#9654;';

    // Build expanded detail section
    let detailHtml = '';
    if (isExpanded) {
      let inner = '';
      if (sg.type === 'merge') {
        const sourceBullets = (sg.taskIds || []).map(tid => {
          const found = findTaskById(tid);
          return found ? `<li>${escHtml(found.task.title)}</li>` : '';
        }).filter(Boolean).join('');
        inner = `<ul class="list-disc list-inside space-y-px text-slate-500 dark:text-slate-400">${sourceBullets}</ul>
          ${sg.after ? `<div class="mt-0.5 text-green-600 dark:text-green-400 font-medium">&rarr; ${escHtml(sg.after)}</div>` : ''}`;
      } else if (sg.type === 'rewrite') {
        inner = `${sg.before ? `<div><span class="line-through text-slate-400">${escHtml(sg.before)}</span></div>` : ''}
          ${sg.after ? `<div class="text-green-600 dark:text-green-400 font-medium">&rarr; ${escHtml(sg.after)}</div>` : ''}`;
      } else if (sg.type === 'move') {
        const found = sg.taskIds?.[0] ? findTaskById(sg.taskIds[0]) : null;
        const currentSection = found ? (SECTION_META[found.section.id]?.title || found.section.title) : '?';
        const targetName = SECTION_META[sg.targetSection]?.title || sg.targetSection || '?';
        inner = `${found ? `<div>${escHtml(found.task.title)}</div>` : ''}
          <div>${escHtml(currentSection)} &rarr; <span class="font-medium text-cyan-600 dark:text-cyan-400">${escHtml(targetName)}</span></div>`;
      } else if (sg.type === 'archive' || sg.type === 'delete') {
        const found = sg.taskIds?.[0] ? findTaskById(sg.taskIds[0]) : null;
        inner = found ? `<div>${escHtml(found.task.title)}${found.task.note ? ` — <span class="italic text-slate-400">${escHtml(found.task.note)}</span>` : ''}</div>` : '';
      }
      if (inner) {
        detailHtml = `<div class="px-2 pb-1.5"><div class="pl-2 border-l-2 border-amber-300 dark:border-amber-600 text-[10px] text-slate-500 dark:text-slate-400 space-y-px">${inner}</div></div>`;
      }
    }

    return `
      <div class="bg-white dark:bg-slate-800 rounded-md border border-slate-100 dark:border-slate-700/50">
        <div class="flex items-center gap-1.5 px-2 py-1 cursor-pointer" onclick="toggleSuggestionDetail('${sg.id}')">
          <span class="text-[9px] text-slate-400" style="line-height:1">${chevron}</span>
          <span class="px-1 py-px rounded text-[8px] font-bold ${color} uppercase">${label}</span>
          <p class="flex-1 text-[11px] text-slate-600 dark:text-slate-300 truncate">${escHtml(sg.description)}</p>
          <div class="flex gap-1 flex-shrink-0" onclick="event.stopPropagation()">
            <button onclick="approveSuggestion('${sg.id}')"
              class="px-1.5 py-0.5 bg-green-500 hover:bg-green-600 text-white text-[10px] font-medium rounded transition-colors">Yes</button>
            <button onclick="declineSuggestion('${sg.id}')"
              class="px-1.5 py-0.5 bg-slate-200 dark:bg-slate-600 hover:bg-slate-300 dark:hover:bg-slate-500 text-slate-500 dark:text-slate-300 text-[10px] font-medium rounded transition-colors">No</button>
          </div>
        </div>${detailHtml}
      </div>
    `;
  }).join('');
}

function saveSuggestRequest() {
  const input = document.getElementById('suggest-input');
  const text = input.value.trim();
  if (!text) return;
  state.suggestionRequest = text;
  input.value = '';
  scheduleSave();
  showToast('Request saved — Claude will process it next session', 'success');
}

function toggleSuggestionDetail(sgId) {
  if (expandedSuggestions.has(sgId)) expandedSuggestions.delete(sgId);
  else expandedSuggestions.add(sgId);
  renderSuggestions();
}

function toggleSuggestions() {
  suggestionsExpanded = !suggestionsExpanded;
  document.getElementById('suggestions-list').classList.toggle('hidden', !suggestionsExpanded);
  document.getElementById('suggestions-chevron').style.transform = suggestionsExpanded ? 'rotate(180deg)' : '';
}

function findTaskById(taskId) {
  for (const section of state.sections) {
    const task = section.tasks.find(t => t.id === taskId);
    if (task) return { task, section };
  }
  return null;
}

function removeTaskById(taskId) {
  for (const section of state.sections) {
    const idx = section.tasks.findIndex(t => t.id === taskId);
    if (idx !== -1) { section.tasks.splice(idx, 1); return; }
  }
}

function approveSuggestion(suggestionId) {
  const sg = (state.suggestions || []).find(s => s.id === suggestionId);
  if (!sg) return;

  switch (sg.type) {
    case 'rewrite': {
      const found = findTaskById(sg.taskIds[0]);
      if (found) found.task.title = sg.after;
      break;
    }
    case 'merge': {
      const keep = findTaskById(sg.taskIds[0]);
      if (keep) {
        const notes = [];
        for (let i = 1; i < sg.taskIds.length; i++) {
          const f = findTaskById(sg.taskIds[i]);
          if (f) {
            if (f.task.note) notes.push(f.task.note);
            removeTaskById(sg.taskIds[i]);
          }
        }
        keep.task.title = sg.after;
        if (notes.length) keep.task.note = [keep.task.note, ...notes].filter(Boolean).join('\n');
      }
      break;
    }
    case 'move': {
      const found = findTaskById(sg.taskIds[0]);
      if (found) {
        const task = found.task;
        removeTaskById(sg.taskIds[0]);
        if (sg.targetSection === 'done' && !task.completedAt) task.completedAt = new Date().toISOString();
        if (sg.targetSection !== 'done' && task.completedAt) task.completedAt = null;
        const target = state.sections.find(s => s.id === sg.targetSection);
        if (target) target.tasks.unshift(task);
      }
      break;
    }
    case 'archive': {
      const found = findTaskById(sg.taskIds[0]);
      if (found) {
        const task = found.task;
        removeTaskById(sg.taskIds[0]);
        task.completedAt = new Date().toISOString();
        const done = state.sections.find(s => s.id === 'done');
        if (done) done.tasks.unshift(task);
      }
      break;
    }
    case 'delete': {
      removeTaskById(sg.taskIds[0]);
      break;
    }
  }

  sg.status = 'approved';
  scheduleSave();
  render();
  showToast('Suggestion applied', 'success');
}

function declineSuggestion(suggestionId) {
  const sg = (state.suggestions || []).find(s => s.id === suggestionId);
  if (sg) sg.status = 'declined';
  scheduleSave();
  render();
}

function dismissAllSuggestions() {
  (state.suggestions || []).forEach(s => {
    if (s.status === 'pending') s.status = 'declined';
  });
  scheduleSave();
  render();
}

function renderSections() {

    const isCollapsed = collapsedLanes[lane.id];

    laneEl.innerHTML = `

      const isDone = secId === 'done';

      });

      const collapsed = isDone && doneCollapsed;

              <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
            </button>
            ${isDone ? `
              <button onclick="toggleDone()" class="p-0.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700">
                <svg class="w-3.5 h-3.5 text-slate-400 transition-transform ${collapsed ? '' : 'rotate-180'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>

        </div>
        <div id="task-list-${lane.id}-${secId}" class="space-y-1 flex-1 overflow-y-auto px-1.5 pb-1.5 min-h-[1.5rem] transition-all ${collapsed ? 'hidden' : ''}" data-section="${secId}" data-lane="${lane.id}">

  }

        class="flex-shrink-0 w-3.5 h-3.5 rounded-full border-[1.5px] ${isDone ? 'bg-green-500 border-green-500' : 'border-slate-300 dark:border-slate-500 hover:border-blue-400'} flex items-center justify-center transition-colors">
        ${isDone ? '<svg class="w-2 h-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
      </button>
      <div class="flex-1 min-w-0 flex items-center gap-1.5">
        <p class="text-[11px] leading-tight truncate ${isDone ? 'line-through text-slate-400 dark:text-slate-500' : 'text-slate-800 dark:text-slate-200'}">${escHtml(task.title)}</p>

function toggleDone() {
  doneCollapsed = !doneCollapsed;
  render();
}

// ═══════════════════════════════════════════════════
//  SORTABLEJS
// ═══════════════════════════════════════════════════
function initSortable() {
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];

  // Find all task list containers (lane-based: task-list-{lane}-{section} and standalone: task-list-things-to-buy)
  document.querySelectorAll('[id^="task-list-"]').forEach(el => {
    const s = new Sortable(el, {
      group: 'tasks',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      delay: 150,
      delayOnTouchOnly: true,
      touchStartThreshold: 3,
      fallbackOnBody: true,
      swapThreshold: 0.65,
      onEnd: handleSortEnd,
      filter: 'button, .text-center',
      preventOnFilter: false,
    });
    sortableInstances.push(s);
  });
}

function handleSortEnd(evt) {
  const taskId = evt.item.dataset.id;
  // Section ID from data attribute or fallback to parsing element ID
  const fromSectionId = evt.from.dataset.section || evt.from.id.replace(/^task-list-(?:\w+-)/, '').replace('task-list-', '');
  const toSectionId = evt.to.dataset.section || evt.to.id.replace(/^task-list-(?:\w+-)/, '').replace('task-list-', '');

  // Find and remove from source
  const fromSection = state.sections.find(s => s.id === fromSectionId);
  const taskIndex = fromSection.tasks.findIndex(t => t.id === taskId);
  if (taskIndex === -1) return;

  const [task] = fromSection.tasks.splice(taskIndex, 1);

  // If moved to done, set completedAt
  if (toSectionId === 'done' && !task.completedAt) {
    task.completedAt = new Date().toISOString();
  }
  // If moved out of done, clear completedAt
  if (toSectionId !== 'done' && task.completedAt) {
    task.completedAt = null;
  }

  // Update category if dragged to a different lane
  const toLane = evt.to.dataset.lane;
  if (toLane && toLane !== (task.category || 'personal')) {
    task.category = toLane;
  }

  // When filtered, DOM indices don't match full array. Use data-id from DOM to find insertion point.
  const toSection = state.sections.find(s => s.id === toSectionId);
  const toListEl = evt.to;
  const domIds = [...toListEl.querySelectorAll('.task-card')].map(el => el.dataset.id);
  const domIndex = domIds.indexOf(taskId);

  if (activeView !== 'all' || searchQuery) {
    // Insert relative to the next visible task in the full array
    const nextVisibleId = domIds[domIndex + 1]; // task after the dropped card
    if (nextVisibleId) {
      const insertBefore = toSection.tasks.findIndex(t => t.id === nextVisibleId);
      toSection.tasks.splice(insertBefore, 0, task);
    } else {
      toSection.tasks.push(task);
    }
  } else {
    const adjustedIndex = Math.min(evt.newIndex, toSection.tasks.length);
    toSection.tasks.splice(adjustedIndex, 0, task);
  }

  scheduleSave();
  render();
}

// ═══════════════════════════════════════════════════
//  TASK ACTIONS
// ═══════════════════════════════════════════════════
function completeTask(taskId, sectionId) {
  const section = state.sections.find(s => s.id === sectionId);
  const taskIndex = section.tasks.findIndex(t => t.id === taskId);
  if (taskIndex === -1) return;

  const task = section.tasks[taskIndex];

  // If already done, un-complete: move back to today
  if (task.completedAt) {
    task.completedAt = null;
    section.tasks.splice(taskIndex, 1);
    const todaySection = state.sections.find(s => s.id === 'today');
    todaySection.tasks.unshift(task);
    scheduleSave();
    render();
    return;
  }

  // Animate then move to done
  const cardEl = document.querySelector(`[data-id="${taskId}"]`);
  if (cardEl) {
    cardEl.classList.add('animate-complete');
    cardEl.addEventListener('animationend', () => {
      task.completedAt = new Date().toISOString();
      section.tasks.splice(taskIndex, 1);
      const doneSection = state.sections.find(s => s.id === 'done');
      doneSection.tasks.unshift(task);
      scheduleSave();
      render();
    }, { once: true });
  } else {
    task.completedAt = new Date().toISOString();
    section.tasks.splice(taskIndex, 1);
    const doneSection = state.sections.find(s => s.id === 'done');
    doneSection.tasks.unshift(task);
    scheduleSave();
    render();
  }
}

// ── Context Menu ──
function openContextMenu(event, taskId, sectionId) {
  event.stopPropagation();
  menuTaskId = taskId;
  menuSectionId = sectionId;

  const menu = document.getElementById('context-menu');
  menu.classList.remove('hidden');

  // Hide the current section from move options
  menu.querySelectorAll('[data-move]').forEach(btn => {
    btn.classList.toggle('hidden', btn.dataset.move === sectionId);
  });

  // Position
  const rect = event.target.closest('button').getBoundingClientRect();
  const menuHeight = 280;
  const menuWidth = 160;
  let top = rect.bottom + 4;
  let left = rect.right - menuWidth;

  if (top + menuHeight > window.innerHeight) top = rect.top - menuHeight - 4;
  if (left < 8) left = 8;

  menu.style.top = top + 'px';
  menu.style.left = left + 'px';

  setTimeout(() => {
    document.addEventListener('click', closeContextMenu, { once: true });
  }, 10);
}

function closeContextMenu() {
  document.getElementById('context-menu').classList.add('hidden');
}

function editTaskFromMenu() {
  closeContextMenu();
  const section = state.sections.find(s => s.id === menuSectionId);
  const task = section?.tasks.find(t => t.id === menuTaskId);
  if (!task) return;

  editingTaskId = menuTaskId;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('modal-save-text').textContent = 'Save Changes';
  document.getElementById('modal-task-title').value = task.title;
  document.getElementById('modal-section').value = menuSectionId;
  document.getElementById('modal-category').value = task.category || 'personal';
  document.getElementById('modal-note').value = task.note || '';
  document.getElementById('modal-tags').value = (task.tags || []).join(', ');
  // Show all fields for Edit
  document.getElementById('modal-section-row').classList.remove('hidden');
  document.getElementById('modal-category-row').classList.remove('hidden');
  document.getElementById('modal-tags-row').classList.remove('hidden');
  document.getElementById('task-modal').classList.remove('hidden');
  document.getElementById('modal-task-title').focus();
}

async function deleteTaskFromMenu() {
  closeContextMenu();
  const confirmed = await showConfirm('Delete this task? This cannot be undone.');
  if (!confirmed) return;

  const section = state.sections.find(s => s.id === menuSectionId);
  const idx = section.tasks.findIndex(t => t.id === menuTaskId);
  if (idx !== -1) {
    section.tasks.splice(idx, 1);
    scheduleSave();
    render();
    showToast('Task deleted', 'success');
  }
}

function moveTask(targetSectionId) {
  closeContextMenu();
  const fromSection = state.sections.find(s => s.id === menuSectionId);
  const idx = fromSection.tasks.findIndex(t => t.id === menuTaskId);
  if (idx === -1) return;

  const [task] = fromSection.tasks.splice(idx, 1);

  if (targetSectionId === 'done' && !task.completedAt) {
    task.completedAt = new Date().toISOString();
  }
  if (targetSectionId !== 'done' && task.completedAt) {
    task.completedAt = null;
  }

  const toSection = state.sections.find(s => s.id === targetSectionId);
  toSection.tasks.unshift(task);

  scheduleSave();
  render();
  showToast(`Moved to ${SECTION_META[targetSectionId]?.title || targetSectionId}`, 'success');
}

// ═══════════════════════════════════════════════════
//  ADD / EDIT MODAL
// ═══════════════════════════════════════════════════
function openAddModal() {
  editingTaskId = null;
  document.getElementById('modal-title').textContent = 'Add Task';
  document.getElementById('modal-save-text').textContent = 'Add Task';
  document.getElementById('modal-task-title').value = '';
  document.getElementById('modal-note').value = '';
  // Hide section/category/tags for Add — context already known
  document.getElementById('modal-section-row').classList.add('hidden');
  document.getElementById('modal-category-row').classList.add('hidden');
  document.getElementById('modal-tags-row').classList.add('hidden');
  document.getElementById('task-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-task-title').focus(), 100);
}

function closeModal() {
  document.getElementById('task-modal').classList.add('hidden');
  editingTaskId = null;
}

function saveTask() {
  const title = document.getElementById('modal-task-title').value.trim();
  if (!title) {
    document.getElementById('modal-task-title').focus();
    return;
  }

  const note = document.getElementById('modal-note').value.trim();

  if (editingTaskId) {
    // Edit existing — read from dropdowns (visible in edit mode)
    const sectionId = document.getElementById('modal-section').value;
    const category = document.getElementById('modal-category').value;
    const tagsRaw = document.getElementById('modal-tags').value;
    const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

    let task = null;
    let oldSectionId = null;
    for (const section of state.sections) {
      const found = section.tasks.find(t => t.id === editingTaskId);
      if (found) {
        task = found;
        oldSectionId = section.id;
        break;
      }
    }
    if (!task) { closeModal(); return; }

    task.title = title;
    task.note = note;
    task.tags = tags;
    task.category = category;

    // If section changed, move it
    if (oldSectionId !== sectionId) {
      const fromSection = state.sections.find(s => s.id === oldSectionId);
      const idx = fromSection.tasks.findIndex(t => t.id === editingTaskId);
      fromSection.tasks.splice(idx, 1);

      if (sectionId === 'done' && !task.completedAt) task.completedAt = new Date().toISOString();
      if (sectionId !== 'done' && task.completedAt) task.completedAt = null;

      const toSection = state.sections.find(s => s.id === sectionId);
      toSection.tasks.unshift(task);
    }

    showToast('Task updated', 'success');
  } else {
    // Add new — use context from quickAdd (no dropdowns)
    const sectionId = addTargetSection;
    const category = addTargetCategory;

    const newTask = {
      id: 't_' + Date.now(),
      title,
      note,
      tags: [],
      category,
      createdAt: new Date().toISOString(),
      completedAt: sectionId === 'done' ? new Date().toISOString() : null,
    };

    const section = state.sections.find(s => s.id === sectionId);
    section.tasks.unshift(newTask);
    showToast('Task added', 'success');
  }

  closeModal();
  scheduleSave();
  render();
}

// ═══════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════
function showSettings() {
  document.getElementById('settings-gh-status').textContent = ghConfig ? 'Yes' : 'No';
  document.getElementById('settings-gh-status').className = `text-sm font-medium ${ghConfig ? 'text-green-500' : 'text-slate-400'}`;
  document.getElementById('settings-modal').classList.remove('hidden');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.add('hidden');
}

function disconnectGitHub() {
  localStorage.removeItem('tb-gh-config');
  ghConfig = null;
  fileSha = null;
  closeSettings();
  setSyncStatus('offline');
  showToast('GitHub disconnected', 'info');
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tasks-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded', 'success');
  closeSettings();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.sections) { showToast('Invalid file — no sections found', 'error'); return; }
        state = data;
        localStorage.setItem('tb-cache', JSON.stringify(state));
        render();
        showToast('Data restored from file', 'success');
        closeSettings();
      } catch (err) {
        showToast('Invalid JSON file', 'error');
      }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

async function restoreBackup() {
  const b1 = localStorage.getItem('tb-backup-1');
  const b2 = localStorage.getItem('tb-backup-2');

  if (!b1 && !b2) {
    showToast('No backups available yet', 'info');
    return;
  }

  let options = [];
  if (b1) {
    try {
      const d = JSON.parse(b1);
      const taskCount = d.sections?.reduce((n, s) => n + (s.tasks?.length || 0), 0) || 0;
      options.push({ key: 'tb-backup-1', label: `Previous save (${taskCount} tasks, ${d.lastModifiedAt ? new Date(d.lastModifiedAt).toLocaleString() : 'unknown'})` });
    } catch {}
  }
  if (b2) {
    try {
      const d = JSON.parse(b2);
      const taskCount = d.sections?.reduce((n, s) => n + (s.tasks?.length || 0), 0) || 0;
      options.push({ key: 'tb-backup-2', label: `Older save (${taskCount} tasks, ${d.lastModifiedAt ? new Date(d.lastModifiedAt).toLocaleString() : 'unknown'})` });
    } catch {}
  }

  if (!options.length) {
    showToast('No valid backups found', 'info');
    return;
  }

  // Simple: restore the most recent backup
  const confirmed = await showConfirm(`Restore to: ${options[0].label}? Your current data will be backed up first.`);
  if (!confirmed) return;

  // Back up current state before restoring
  localStorage.setItem('tb-backup-2', localStorage.getItem('tb-backup-1') || localStorage.getItem('tb-cache'));
  localStorage.setItem('tb-backup-1', localStorage.getItem('tb-cache'));

  const restored = localStorage.getItem(options[0].key);
  state = JSON.parse(restored);
  localStorage.setItem('tb-cache', JSON.stringify(state));
  render();
  showToast('Backup restored', 'success');
  closeSettings();
}

// ═══════════════════════════════════════════════════
//  PULL TO REFRESH (Mobile)
// ═══════════════════════════════════════════════════
let pullStartY = 0;
let pulling = false;

document.addEventListener('touchstart', (e) => {
  if (window.scrollY === 0 && e.touches.length === 1) {
    pullStartY = e.touches[0].clientY;
    pulling = true;
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (!pulling) return;
  const diff = e.touches[0].clientY - pullStartY;
  if (diff > 0 && diff < 150) {
    document.getElementById('pull-indicator').style.transform = `translateY(${diff * 0.4}px)`;
  }
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!pulling) return;
  pulling = false;
  const indicator = document.getElementById('pull-indicator');
  const transform = parseFloat(indicator.style.transform.replace(/[^0-9.]/g, '') || '0');
  indicator.style.transform = 'translateY(0)';
  if (transform > 30) {
    manualSync();
  }
});

// ═══════════════════════════════════════════════════
//  CLICK OUTSIDE HANDLERS
// ═══════════════════════════════════════════════════
document.addEventListener('click', (e) => {
  // Close modals on backdrop click
  if (e.target.id === 'task-modal') closeModal();
  if (e.target.id === 'settings-modal') closeSettings();
  if (e.target.id === 'confirm-dialog') confirmResolve(false);
});

// Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    closeSettings();
    closeContextMenu();
    closeGoalPopover();
    confirmResolve(false);
  }
});

// ═══════════════════════════════════════════════════
//  ONLINE/OFFLINE DETECTION
// ═══════════════════════════════════════════════════
window.addEventListener('online', () => {
  isOffline = false;
  document.getElementById('offline-banner').classList.add('hidden');
  if (localStorage.getItem('tb-pending-save') === 'true') {
    localStorage.removeItem('tb-pending-save');
    scheduleSave();
  }
  manualSync();
});

window.addEventListener('offline', () => {
  isOffline = true;
  document.getElementById('offline-banner').classList.remove('hidden');
  setSyncStatus('offline');
});

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}
